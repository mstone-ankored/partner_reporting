version: 2

seeds:
  - name: ref_partners
    description: |
      Canonical partner dimension. Single source of truth for partner names,
      email domains (used for partner_email attribution), tiers, and start
      dates. Update this file to onboard a new partner.
    columns:
      - name: partner_id
        tests: [not_null, unique]
      - name: partner_name
        tests: [not_null, unique]
      - name: partner_domain
        description: |
          Primary email domain for inbound-email attribution (Method 4 in
          int_partner_contact_attribution). Optional — partners without a
          known domain still work fine via the other attribution methods
          (HubSpot's referring_partner dropdown, form fields, etc.).

  - name: partner_total_customers
    description: |
      Time-series of each partner's total customer count. One row per
      (partner_id, as_of_date). Feeds partner_penetration. The dashboard
      updates dynamically whenever a new as_of_date row is appended and dbt
      seed is re-run.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [partner_id, as_of_date]
    columns:
      - name: partner_id
        tests: [not_null]
      - name: as_of_date
        tests: [not_null]
      - name: total_customer_count
        tests:
          - not_null
          - dbt_utils.accepted_range: {min_value: 0, inclusive: true}
