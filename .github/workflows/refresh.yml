name: refresh-partner-reporting

# Scheduled dbt build against Neon, then push the selected mart rows to Notion.
# The web app (on Vercel) reads Neon live, so the dashboard is always fresh as
# soon as dbt finishes — Notion is eventual-consistency on the 30-min cadence.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   NEON_HOST, NEON_USER, NEON_PASSWORD, NEON_DATABASE   — dbt target
#   DATABASE_URL                                         — used by notion_sync.py
#   NOTION_API_KEY                                       — Notion integration token
#   NOTION_WORKSPACE_ID (optional)                       — scope override

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "dbt_project.yml"
      - "scripts/notion_sync.py"

concurrency:
  group: refresh-partner-reporting
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
      NEON_HOST:     ${{ secrets.NEON_HOST }}
      NEON_USER:     ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
      NEON_DATABASE: ${{ secrets.NEON_DATABASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      - name: Configure dbt profile
        run: |
          mkdir -p .dbt
          cat > .dbt/profiles.yml <<'EOF'
          partner_reporting:
            target: prod
            outputs:
              prod:
                type: postgres
                host: "{{ env_var('NEON_HOST') }}"
                user: "{{ env_var('NEON_USER') }}"
                password: "{{ env_var('NEON_PASSWORD') }}"
                port: 5432
                dbname: "{{ env_var('NEON_DATABASE') }}"
                schema: partner_reporting
                sslmode: require
                threads: 8
                keepalives_idle: 0
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt build
        run: dbt build --target prod

      - name: Sync to Notion
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_WORKSPACE_ID: ${{ secrets.NOTION_WORKSPACE_ID }}
        run: python scripts/notion_sync.py

      - name: Upload dbt artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target
          path: target/
          retention-days: 7
