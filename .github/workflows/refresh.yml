name: refresh-partner-reporting

# Scheduled HubSpot sync → dbt build → Notion push.
#
# Pipeline:
#   1. scripts/hubspot_sync.py  — pull raw HubSpot objects into Neon `hubspot` schema
#   2. dbt build                — staging → intermediate → marts in `partner_reporting`
#   3. scripts/notion_sync.py   — push selected mart rows to Notion databases
#
# The web app (on Vercel) reads Neon live, so the dashboard is always fresh as
# soon as dbt finishes — Notion is eventual-consistency on the 30-min cadence.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   DATABASE_URL                                         — Neon pooled URL. Host/user/
#                                                          password/dbname are parsed
#                                                          out of it for dbt.
#   HUBSPOT_ACCESS_TOKEN                                 — HubSpot private-app token
#   NOTION_API_KEY                                       — Notion integration token
#   NOTION_WORKSPACE_ID (optional)                       — scope override

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "dbt_project.yml"
      - "scripts/hubspot_sync.py"
      - "scripts/notion_sync.py"

concurrency:
  group: refresh-partner-reporting
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
      DATABASE_URL:     ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      - name: Parse DATABASE_URL into NEON_* env vars
        # dbt-postgres can't consume a single connection URL, so derive the
        # four pieces it needs from DATABASE_URL. Values are masked in logs.
        run: |
          python3 - <<'PY'
          import os, urllib.parse
          u = urllib.parse.urlparse(os.environ["DATABASE_URL"])
          vals = {
              "NEON_HOST": u.hostname or "",
              "NEON_USER": urllib.parse.unquote(u.username or ""),
              "NEON_PASSWORD": urllib.parse.unquote(u.password or ""),
              "NEON_DATABASE": (u.path or "").lstrip("/") or "neondb",
          }
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              for k, v in vals.items():
                  env_file.write(f"{k}={v}\n")
          # Mask the secret-ish values in logs.
          print(f"::add-mask::{vals['NEON_PASSWORD']}")
          print(f"::add-mask::{vals['NEON_USER']}")
          print(f"::add-mask::{vals['NEON_HOST']}")
          PY

      - name: Configure dbt profile
        run: |
          mkdir -p .dbt
          cat > .dbt/profiles.yml <<'EOF'
          partner_reporting:
            target: prod
            outputs:
              prod:
                type: postgres
                host: "{{ env_var('NEON_HOST') }}"
                user: "{{ env_var('NEON_USER') }}"
                password: "{{ env_var('NEON_PASSWORD') }}"
                port: 5432
                dbname: "{{ env_var('NEON_DATABASE') }}"
                schema: partner_reporting
                sslmode: require
                threads: 8
                keepalives_idle: 0
          EOF

      - name: dbt deps
        run: dbt deps

      - name: Sync HubSpot → Neon
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python scripts/hubspot_sync.py

      - name: dbt build
        run: dbt build --target prod

      - name: Sync to Notion
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_WORKSPACE_ID: ${{ secrets.NOTION_WORKSPACE_ID }}
        run: python scripts/notion_sync.py

      - name: Upload dbt artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target
          path: target/
          retention-days: 7
