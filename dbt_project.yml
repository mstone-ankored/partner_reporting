name: partner_reporting
version: 1.0.0
config-version: 2

profile: partner_reporting

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Variables control which HubSpot pipeline properties map to partner attribution.
# Override per-environment in profiles.yml or dbt run --vars.
vars:
  # Custom HubSpot contact property (dropdown) that names the referring partner.
  # Value should match an entry in ref_partners.partner_name (case-insensitive).
  partner_name_contact_property: "referring_partner"

  # Custom HubSpot deal property (dropdown) that names the referring partner on
  # the deal itself. Used as a first-class attribution signal alongside
  # deal_source = 'Partner Referral'.
  partner_name_deal_property: "referring_partner"

  # HubSpot deal enumeration `deal_source`; the value that marks a deal as
  # partner-sourced. Matched case-insensitively.
  deal_source_partner_value: "Partner Referral"

  # Contact enumerations that flag a lead as partner-sourced when the
  # `referring_partner` dropdown isn't filled in. Lowercased, whitespace
  # trimmed; any match promotes the contact to partner_email source_type
  # (partner unknown).
  partner_contact_source_markers:
    - "partner_referral"
    - "partner"
    - "partner referral (partner)"

  # Case-insensitive prefix: any form whose name starts with this value is
  # treated as a partner-referral form. Designed for HubSpot form naming
  # conventions like "Partner Referral - LeagueApps", "Partner Introduction",
  # "Partner Lead Form", etc.
  partner_form_name_prefix: "Partner"

  # Exact-match fallback list for form names that don't start with the prefix
  # above but should still be treated as partner-referral. Leave empty if the
  # prefix rule is enough.
  partner_referral_form_names:
    - "Partner Referral"
    - "Partner Introduction"

  # Form field keys that carry partner attribution. Any non-null value in these
  # keys promotes the submission to source_type = 'form'.
  partner_form_fields:
    - "partner_name"
    - "partner_referral"
    - "referring_partner"

  # HubSpot deal stages in the primary sales pipeline, ordered low → high.
  # Used for stage-level conversion & drop-off analysis.
  deal_stage_order:
    - "discovery"
    - "demo"
    - "proposal"
    - "negotiation"
    - "closed_won"

  # Terminal stages that indicate the deal is no longer in pipeline.
  closed_won_stages: ["closed_won"]
  closed_lost_stages: ["closed_lost"]

  # Lifecycle stages used for lead-quality metrics.
  mql_lifecycle_values: ["marketingqualifiedlead", "mql"]
  sql_lifecycle_values: ["salesqualifiedlead", "sql"]
  disqualified_lifecycle_values: ["other", "disqualified"]

  # Lookback window for incremental models (days). First-run / full-refresh ignores this.
  incremental_lookback_days: 14

models:
  partner_reporting:
    # Everything lands in the default target schema (partner_reporting) so the
    # web app, which queries `partner_reporting.<mart>`, sees it without any
    # env-var overrides. Intermediate models are ephemeral (inlined as CTEs).
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table

seeds:
  partner_reporting:
    ref_partners:
      +column_types:
        partner_id: text
        partner_name: text
        partner_domain: text
        partner_tier: text
        partner_start_date: date
    partner_total_customers:
      +column_types:
        partner_id: text
        partner_name: text
        as_of_date: date
        total_customer_count: integer
